display_name: Amazon Storyboard Demo
short_description: Build Amazon product-led social cinematic storyboard packages with the same three-section structure as the TikTok storyboard skill.
default_prompt: Use this skill to turn an Amazon ASIN, product URL, product image, screenshot, or short product description into exactly three sections: product image, storyboard, and 15-second or 30-second English script text. The storyboard section must contain a Creative Film Treatment, a Shooting World Lock, and one 5-panel 16:9 continuous keyframe contact sheet. Keep the product as hero, include a wearer/user/operator when the category needs real-use proof, and make all five panels feel like one continuous shoot. Do not add JSON, long analysis, or extra sections unless requested.
