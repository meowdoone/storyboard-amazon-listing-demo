display_name: Amazon Storyboard Demo
short_description: Build Amazon product-led storyboard packages with the same three-section structure as the TikTok storyboard skill.
default_prompt: Use this skill to turn an Amazon ASIN, product URL, product image, screenshot, or short product description into exactly three sections: product image, 5-panel 16:9 product-led storyboard image, and 15-second or 30-second English script text. Do not add JSON, long analysis, or extra sections unless requested.
