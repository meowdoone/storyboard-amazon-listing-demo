display_name: Amazon Storyboard Demo
short_description: Build Amazon product-led category-adapted storyboard packages with the same three-section structure as the TikTok storyboard skill.
default_prompt: Use this skill to turn an Amazon ASIN, product URL, product image, screenshot, or short product description into exactly three sections: product image, storyboard, and 15-second or 30-second English script text. In the storyboard section, infer the product category first, apply the matching product truth lock and low-AI-risk keyframe library, then provide a Creative Film Treatment, a Shooting World Lock, and five numbered 16:9 product-proof keyframes. Keep the product as hero, include a wearer/user/operator only when the category needs real-use proof, and do not force a contact sheet unless requested. Do not add JSON, long analysis, or extra sections unless requested.
